name: Release Builds

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare
        id: vars
        shell: bash
        run: |
          APP_NAME=$(basename $GITHUB_REPOSITORY)
          VERSION=${GITHUB_REF#refs/tags/}
          echo "app=$APP_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package
        shell: bash
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ steps.vars.outputs.app }}* dist/ || true
          cp README.md LICENSE dist/ 2>/dev/null || true

          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -czf ${{ steps.vars.outputs.app }}-${{ steps.vars.outputs.version }}-${{ matrix.target }}.tar.gz -C dist .
          else
            powershell Compress-Archive -Path dist\* -DestinationPath ${{ steps.vars.outputs.app }}-${{ steps.vars.outputs.version }}-${{ matrix.target }}.zip
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            **/*.tar.gz
            **/*.zip