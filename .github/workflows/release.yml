name: Release

on:
  push:
    tags:
      - 'v*' # Triggers only when you push a tag like v1.0.0

permissions:
  contents: write # Essential for creating the release and uploading assets

jobs:
  publish:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - build: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: linux-x86_64.tar.gz
          - build: macos-intel
            os: macos-latest
            target: x86_64-apple-darwin
            archive_name: macos-x86_64.tar.gz
          - build: macos-arm
            os: macos-latest
            target: aarch64-apple-darwin
            archive_name: macos-arm64.tar.gz
          - build: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: windows-x86_64.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Staging Area
        shell: bash
        run: |
          # Create a clean folder to avoid subfolders in the archive
          mkdir -p staging
          
          # Handle Windows .exe extension
          BINARY_NAME="${{ github.event.repository.name }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/$BINARY_NAME.exe" staging/
          else
            cp "target/${{ matrix.target }}/release/$BINARY_NAME" staging/
          fi
          
          # Add README and LICENSE
          cp README.md LICENSE staging/

      - name: Create Archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd staging
          tar -czf "../${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.archive_name }}" *

      - name: Create Archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd staging
          Compress-Archive -Path * -DestinationPath "../${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.archive_name }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.archive_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}